      <stop offset="0%" style="stop-color:#fafaf8"/>
      <stop offset="100%" style="stop-color:#f0ece4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="120" fill="#4f6ef7" opacity="0.06"/>
