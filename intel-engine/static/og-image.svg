  <circle cx="200" cy="500" r="60" fill="#6db88a" opacity="0.06"/>
  <!-- Logo icon -->
  <g transform="translate(100, 220)">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
