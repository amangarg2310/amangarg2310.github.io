<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distylme — Your knowledge, distilled</title>

    <meta name="description" content="Your knowledge, distilled. Paste a link, upload a document — we extract every insight and build your knowledge base automatically.">
    <meta property="og:title" content="Distylme — Your knowledge, distilled">
    <meta property="og:description" content="Paste a link, upload a document — we extract every insight and build your knowledge base automatically.">
    <meta property="og:image" content="https://distylme.com/static/og-image.png">
    <meta property="og:url" content="https://distylme.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Distylme">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Distylme — Your knowledge, distilled">
    <meta name="twitter:description" content="Paste a link, upload a document — extract every insight automatically.">
    <meta name="twitter:image" content="https://distylme.com/static/og-image.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='intel.css') }}?v={{ cache_bust }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
<div class="intel-page">
    <nav class="intel-nav">
        <div class="intel-nav-brand">
            <div class="intel-nav-logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="intel-nav-wordmark">distyl<span class="intel-nav-wordmark-accent">me</span></span>
        </div>
    </nav>

    <div class="intel-hero">
        <h1 class="intel-hero-title">Welcome back.</h1>
        <p class="intel-hero-subtitle">Sign in to your knowledge base.</p>

        {% if error %}
        <div style="background: var(--intel-red-light); color: var(--intel-red); padding: 12px 20px; border-radius: 12px; font-size: 14px; margin-bottom: 24px; max-width: 400px; width: 100%;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login_page') }}" style="width: 100%; max-width: 400px;">
            <div style="margin-bottom: 12px;">
                <input type="email" name="email" class="intel-input" placeholder="Email" required
                       style="padding: 14px 20px;" value="{{ request.form.get('email', '') }}">
            </div>
            <div style="margin-bottom: 20px;">
                <input type="password" name="password" class="intel-input" placeholder="Password" required
                       style="padding: 14px 20px;">
            </div>
            <button type="submit" class="intel-hub-submit wide">Sign In</button>
        </form>

        <p style="margin-top: 24px; font-size: 14px; color: var(--intel-text-secondary);">
            Don't have an account? <a href="{{ url_for('register_page') }}" style="color: var(--intel-accent); text-decoration: none; font-weight: 500;">Create one</a>
        </p>
    </div>
</div>
</body>
</html>
