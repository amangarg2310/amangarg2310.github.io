<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup — Distylme</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='intel.css') }}">
</head>
<body>
<div class="intel-page">
    <nav class="intel-nav">
        <div class="intel-nav-brand">
            <div class="intel-nav-logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="intel-nav-wordmark">distyl<span class="intel-nav-wordmark-accent">me</span></span>
        </div>
    </nav>

    <div class="intel-hero">
        <h1 class="intel-hero-title">Welcome.</h1>
        <p class="intel-hero-subtitle">
            One thing before we start — you'll need an OpenAI API key so the engine can extract and synthesize knowledge.
        </p>

        {% if error %}
        <div style="background: var(--intel-red-light); color: var(--intel-red); padding: 12px 20px; border-radius: 12px; font-size: 14px; margin-bottom: 24px; max-width: 480px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('save_setup') }}" style="width: 100%; max-width: 480px;">
            <div style="margin-bottom: 8px;">
                <label style="font-size: 13px; font-weight: 600; color: var(--intel-text-secondary); display: block; margin-bottom: 8px;">
                    OpenAI API Key
                </label>
                <input type="password"
                       name="openai_key"
                       class="intel-input"
                       placeholder="sk-..."
                       autocomplete="off"
                       required
                       style="padding-right: 20px;">
            </div>
            <p style="font-size: 12px; color: var(--intel-text-tertiary); margin: 0 0 24px; line-height: 1.5;">
                Get your key at <a href="https://platform.openai.com/api-keys" target="_blank" style="color: var(--intel-accent); text-decoration: none;">platform.openai.com</a>.
                Uses GPT-4o-mini (~$0.15/1M input tokens).
            </p>
            <button type="submit" class="intel-input-btn" style="position: relative; width: 100%; height: 48px; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: var(--intel-font);">
                Get Started
            </button>
        </form>
    </div>
</div>
</body>
</html>
